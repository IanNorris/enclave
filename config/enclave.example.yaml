# Enclave example configuration
# Copy to enclave.yaml and fill in your values

matrix:
  homeserver: "https://matrix.example.com"
  bot_user: "@enclave:example.com"
  bot_password: ""  # Or use access_token instead
  # access_token: "syt_..."

  # Space and room configuration
  space_name: "Enclave"
  control_room: "#enclave-control:example.com"
  approvals_room: "#enclave-approvals:example.com"

users:
  "@ian:example.com":
    linux_user: ian
    display_name: "Ian"
    pronouns: "he/him"
    allowed_rooms: ["#project-*:example.com", "#enclave-control:example.com"]
    max_sessions: 10

containers:
  runtime: podman
  base_image: "enclave-agent:base"
  network: none  # default: no network
  userns: keep-id
  # Where session workspaces live on the host
  workspace_root: "/home/aeon/workspaces"
  session_root: "/home/aeon/sessions"

display:
  compositor: hyprland
  screenshot_tool: grim
  clipboard_tools:
    copy: wl-copy
    paste: wl-paste

# Memory settings
memory:
  auto_memory: true        # Enable cross-session memory persistence
  auto_dreaming: true      # Enable automatic context scanning
  key_memory_limit: 200    # Max lines of key memories in system prompt

# Idle timeout (seconds). Sessions with no activity and no running
# processes are stopped after this duration. Default: 7200 (2 hours).
# Set to 0 to disable.
idle_timeout: 7200
