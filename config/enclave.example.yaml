# Enclave example configuration
# Copy to enclave.yaml and fill in your values

matrix:
  # Set to false to run Enclave web-UI-only (no Matrix login, control room,
  # or sync loop). When omitted, Matrix is enabled automatically only if
  # credentials (homeserver + user_id + password) are present; a fresh deploy
  # with no credentials starts web-UI-only instead of failing. Override at
  # runtime with ENCLAVE_MATRIX_ENABLED=true|false.
  enabled: false
  homeserver: "https://matrix.example.com"
  bot_user: "@enclave:example.com"
  bot_password: ""  # Or use access_token instead
  # access_token: "syt_..."

  # Space and room configuration
  space_name: "Enclave"
  control_room: "#enclave-control:example.com"
  approvals_room: "#enclave-approvals:example.com"

users:
  "@ian:example.com":
    linux_user: ian
    display_name: "Ian"
    pronouns: "he/him"
    allowed_rooms: ["#project-*:example.com", "#enclave-control:example.com"]
    max_sessions: 10

containers:
  runtime: podman
  base_image: "enclave-agent:base"
  network: none  # default: no network
  userns: keep-id
  # Where session workspaces live on the host
  workspace_root: "/home/aeon/workspaces"
  session_root: "/home/aeon/sessions"
  # Port mapping: agents can request ports in this range
  # public_hostname: "dev.local"  # hostname reported to users (auto-detected if empty)
  # port_range_start: 9000
  # port_range_end: 9200
  # port_bind_address: "127.0.0.1"  # bind published ports to localhost only
  # port_network: "slirp4netns"  # network mode when ports are mapped

display:
  compositor: hyprland
  screenshot_tool: grim
  clipboard_tools:
    copy: wl-copy
    paste: wl-paste

# Memory settings
memory:
  auto_memory: true        # Enable cross-session memory persistence
  auto_dreaming: true      # Enable automatic context scanning
  key_memory_limit: 200    # Max lines of key memories in system prompt

# Idle timeout (seconds). Sessions with no activity and no running
# processes are stopped after this duration. Default: 7200 (2 hours).
# Set to 0 to disable.
idle_timeout: 7200

# Host approval gate
#
# Host-profile sessions run with your full user privileges (no container
# sandbox), so restricted operations (system tools, paths outside the
# session scratch space) are screened by an approval gate that surfaces a
# card in the web UI for you to approve or deny. Container sessions are
# sandboxed and are unaffected by this gate.
host_approval:
  # Master switch. true = restricted host ops require approval; false =
  # allow-all (the gate is bypassed entirely). The emergency escape hatch
  # ENCLAVE_HOST_APPROVAL=off overrides this to false at runtime, so you can
  # never get locked out if the approval UI is unreachable.
  gate: true
  # Session ids that always bypass the gate even when it is on — for trusted
  # operator/control sessions that must never be blocked. Bypasses are still
  # written to the audit log.
  bypass_sessions: []
