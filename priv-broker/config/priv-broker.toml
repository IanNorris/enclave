# Enclave Privilege Broker Configuration
#
# This file controls what the privilege broker will accept.
# The broker runs as root and executes commands on behalf of the orchestrator.
# Be cautious with what you allow.

# Unix socket path
socket_path = "/run/enclave-priv/broker.sock"

# Socket permissions (octal)
socket_mode = 0o660

# User allowed to connect to the socket
allowed_user = "ian"

# Default command timeout in seconds
timeout_secs = 30

# Allowed command patterns (regex). If empty, all non-denied commands are allowed.
# allowed_commands = [
#   "^apt\\s+",
#   "^systemctl\\s+(start|stop|restart|status)\\s+",
#   "^mount\\s+",
#   "^umount\\s+",
# ]

# Denied command patterns (regex). Checked before allowed_commands.
denied_commands = [
    "^rm\\s+-rf\\s+/\\s*$",     # rm -rf /
    "^chmod\\s+777\\s+/",        # chmod 777 /
    "^dd\\s+.*of=/dev/",         # dd to devices
    "^mkfs",                      # format filesystems
    "^fdisk",                     # partition tools
]

# Allowed mount source paths (regex)
allowed_mount_paths = [
    "^/home/",
    "^/tmp/enclave-",
]

# Denied mount paths (checked first)
denied_mount_paths = [
    "^/boot",
    "^/dev",
    "^/proc",
    "^/sys",
    "^/etc",
]
